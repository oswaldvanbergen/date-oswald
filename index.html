<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#7fbfff">
  <meta name="description" content="A tiny open-source date invitation builder with calm animated-toy storytelling.">
  <title>⚠️Confidential</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="ambient ambient-sky" aria-hidden="true"></div>
  <div class="ambient ambient-waves" aria-hidden="true"></div>

  <main id="app" class="app">
    <section id="intro" class="screen intro" aria-labelledby="intro-title">
      <div class="card hero-card">
        <div class="topline">
          <span>⚠️Confidential</span>
          <button id="music-toggle" class="pill-button" type="button" aria-pressed="false">
            <span class="music-dot" aria-hidden="true"></span>
            <span id="music-label">music off</span>
          </button>
        </div>

        <div class="hero-grid">
          <div class="hero-copy">
            <p class="kicker">Dear Ms Vi / 霞薇</p>
            <h1 id="intro-title">Please choose your adventure</h1>
            <p class="lede">a night to remember</p>
            <button id="start" class="primary-action" type="button">Start</button>
          </div>

          <div class="toy-stage" aria-hidden="true">
            <img src="retro-galactic-hero.jpg" alt="">
            <img src="vintage-cowboy-doll.jpg" alt="">
            <img src="silly-spud-toy.jpg" alt="">
          </div>
        </div>
      </div>
    </section>

    <section id="planner" class="screen planner hidden" aria-live="polite">
      <header class="planner-header">
        <div>
          <p id="step-kicker" class="kicker"></p>
          <h2 id="step-title"></h2>
        </div>
        <div class="step-count" id="step-count"></div>
      </header>

      <div class="rainbow-track" aria-hidden="true">
        <div id="progress" class="rainbow-fill"></div>
      </div>

      <section class="planner-layout">
        <div>
          <div id="options" class="options"></div>
          <nav class="nav-actions" aria-label="Planner navigation">
            <button id="back" class="secondary-action" type="button">Back</button>
            <button id="next" class="primary-action" type="button">Next</button>
          </nav>
        </div>

        <aside class="plan-card" aria-labelledby="plan-title">
          <p class="kicker">Ongoing</p>
          <h3 id="plan-title">Still choosing</h3>
          <div id="mini-plan" class="mini-plan"></div>
        </aside>
      </section>
    </section>

    <section id="final" class="screen final hidden" aria-labelledby="final-title">
      <div class="final-wrap">
        <div class="final-top">
          <p class="kicker"></p>
          <h2 id="final-title">BADA BING BADA BOOM</h2>
        </div>

        <article id="poster" class="poster" aria-label="Final selected date plan"></article>

        <div class="final-actions">
          <button id="copy" class="primary-action" type="button">Copy plan</button>
          <button id="share" class="secondary-action" type="button">Share</button>
          <button id="restart" class="secondary-action" type="button">Restart</button>
        </div>

        <p id="toast" class="toast hidden" role="status"></p>
      </div>
    </section>
  </main>

  <script defer src="app.bundle.js"></script>
</body>
</html>
